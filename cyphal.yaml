# ============================================================
# 二进制传感器示例
# 使用标准DSDL: uavcan.primitive.scalar.Bit
# ============================================================
binary_sensor:
  # 从Cyphal网络接收二进制状态
  - platform: cyphal
    cyphal_id: my_cyphal
    name: "Remote Binary Sensor"
    subject_id: 7000
    dsdl_type: "uavcan.primitive.scalar.Bit"
    type: subscribe
    extent: 32
  
  # 发布二进制状态到Cyphal网络
  # - platform: cyphal
  #   cyphal_id: my_cyphal
  #   name: "Published Binary State"
  #   subject_id: 7001
  #   dsdl_type: "uavcan.primitive.scalar.Bit"
  #   type: publish
  #   source_sensor: local_binary_sensor

# ============================================================
# DALI 网关配置 (两路 DALI)
# ============================================================
dali:
  - id: dali_bus_1
    tx_pin: GPIO17
    rx_pin: GPIO16
    timer_num: 0
    cyphal_id: my_cyphal
    mappings:
      # Cyphal Subject 6000 -> DALI 短地址 3 (使用 Natural8)
      - subject_id: 6000
        address: 3
        address_type: SHORT
        dsdl_type: "uavcan.primitive.scalar.Natural8"
      # Cyphal Subject 6001 -> DALI 组地址 1 (使用 Bit)
      - subject_id: 6001
        address: 1
        address_type: GROUP
        dsdl_type: "uavcan.primitive.scalar.Bit"

  - id: dali_bus_2
    tx_pin: GPIO18
    rx_pin: GPIO19
    timer_num: 1
    cyphal_id: my_cyphal

# ============================================================
# DALI 灯光实体
# ============================================================
light:
  # DALI 灯 1 (总线 1)
  - platform: dali
    dali_id: dali_bus_1
    name: "Dali Light 1"
    address: 3
    address_type: SHORT

  # DALI 组 1 (总线 1)
  - platform: dali
    dali_id: dali_bus_1
    name: "Dali Group 1"
    address: 1
    address_type: GROUP

  # DALI 广播 (总线 2)
  - platform: dali
    dali_id: dali_bus_2
    name: "Dali Bus 2 Broadcast"
    address: 255
    address_type: BROADCAST

  # 从Cyphal网络接收亮度控制命令
  - platform: cyphal
    cyphal_id: my_cyphal
    name: "Remote Controlled Light"
    subject_id: 5000
    dsdl_type: "uavcan.primitive.scalar.Natural8"
    type: subscribe
    extent: 8  # Natural8 is 1 byte (8 bits)
  
  # 从Cyphal网络接收RGB控制命令
  - platform: cyphal
    cyphal_id: my_cyphal
    name: "Remote RGB Light"
    subject_id: 5001
    dsdl_type: "reg.udral.physics.optics.HighColor"
    type: subscribe
    extent: 16 # RGB565 is 2 bytes (16 bits)
# ============================================================
# 可用的标准DSDL类型参考
# ============================================================
# uavcan.primitive.scalar:
#   - Bit_1_0 (布尔值)
#   - Natural8_1_0, Natural16_1_0, Natural32_1_0, Natural64_1_0 (无符号整数)
#   - Integer8_1_0, Integer16_1_0, Integer32_1_0, Integer64_1_0 (有符号整数)
#   - Real16_1_0, Real32_1_0, Real64_1_0 (浮点数)
#
# uavcan.si.sample:
#   - temperature.Scalar_1_0 (温度，单位: 开尔文)
#   - pressure.Scalar_1_0 (压力，单位: 帕斯卡)
#   - power.Scalar_1_0 (功率，单位: 瓦特)
#   - voltage.Scalar_1_0 (电压，单位: 伏特)
#   - electric_current.Scalar_1_0 (电流，单位: 安培)
#   - energy.Scalar_1_0 (能量，单位: 焦耳)
#   - electric_charge.Scalar_1_0 (电荷，单位: 库仑)
#   - length.Scalar_1_0 (长度，单位: 米)
#   - mass.Scalar_1_0 (质量，单位: 千克)
#   - ... (更多SI单位类型)
#
# reg.udral.physics.optics:
#   - HighColor_0_1 (RGB565颜色)
#
# uavcan.node:
#   - Heartbeat_1_0 (节点心跳)
#   - Mode_1_0 (节点模式)
#   - Health_1_0 (节点健康状态)