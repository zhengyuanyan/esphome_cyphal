# ============================================================
# ESPHome Cyphal 组件示例配置
# 使用标准DSDL类型进行CAN总线通信
# 支持节点模式和网关模式
# ============================================================

esphome:
  name: cyphal-node
  platformio_options:
    build_flags:
      - -std=gnu++17
  build_path: build/cyphal-esp32-node
  min_version: 2026.3.0

esp32:
  board: esp32dev
  framework:
    type: arduino

external_components:
  - source:
      type: local
      path: components

logger:
  level: DEBUG

# ============================================================
# CAN 总线配置
# ============================================================
canbus:
  - id: can_bus
    platform: esp32_can
    can_id: 1
    tx_pin: GPIO21
    rx_pin: GPIO22
    bit_rate: 250kbps
    use_extended_id: true

# ============================================================
# Cyphal 核心配置 - 节点模式
# 使用标准DSDL类型进行通信
# ============================================================
cyphal:
  id: my_cyphal
  canbus_id: can_bus
  node_id: 42
  mode: node  # 节点模式 (或 gateway 网关模式)
  
  # 心跳配置 (uavcan.node.Heartbeat)
  heartbeat:
    subject_id: 7509
    interval: 1s

  # 订阅示例 - 使用标准DSDL类型
  # uavcan.primitive.scalar.Real32 - 通用浮点数值
  subscriptions:
    - subject_id: 1000
      extent: 256
      dsdl_type: "uavcan::primitive::scalar::Real32_1_0"
      on_receive: |-
        ESP_LOGD("cyphal", "Received Real32 value: %.2f from node %d", msg.value, remote_node_id);
    
    # uavcan.primitive.scalar.Bit - 布尔值
    - subject_id: 1001
      extent: 32
      dsdl_type: "uavcan::primitive::scalar::Bit_1_0"
      on_receive: |-
        ESP_LOGD("cyphal", "Received Bit value: %s from node %d", msg.value ? "true" : "false", remote_node_id);
  
  # 发布示例 - 使用标准DSDL类型
  publishers:
    # 发布浮点数值
    - subject_id: 2000
      dsdl_type: "uavcan::primitive::scalar::Real32_1_0"
      interval: 5s
      priority: 4
      payload: msg.value = 25.5f;
    
    # 发布布尔值
    - subject_id: 2001
      dsdl_type: "uavcan::primitive::scalar::Bit_1_0"
      interval: 1s
      priority: 4
      payload: msg.value = true;

# ============================================================
# Cyphal 传感器模块示例
# 通过YAML配置dsdl_type，支持任意传感器类型
# ============================================================
sensor:
  # 本地DHT传感器
  - platform: dht
    pin: GPIO13
    temperature:
      name: "Local Temperature"
      id: local_temp
    humidity:
      name: "Local Humidity"
      id: local_humidity
    update_interval: 10s
  
  # ==========================================================
  # 将本地温度发布到Cyphal网络 (发送到其他节点)
  # DSDL类型: uavcan.si.sample.temperature.Scalar
  # subject_id: 3002 (其他节点订阅此ID接收温度)
  # ==========================================================
  - platform: cyphal
    cyphal_id: my_cyphal
    name: "Cyphal Temperature Publisher"
    subject_id: 3002
    dsdl_type: "uavcan.si.sample.temperature.Scalar"
    type: publish
    source_sensor: local_temp
    publish_interval: 5s
  
  # ==========================================================
  # 将本地湿度发布到Cyphal网络 (发送到其他节点)
  # DSDL类型: uavcan.primitive.scalar.Real32 (湿度没有标准DSDL类型，用Real32)
  # subject_id: 3003 (其他节点订阅此ID接收湿度)
  # ==========================================================
  - platform: cyphal
    cyphal_id: my_cyphal
    name: "Cyphal Humidity Publisher"
    subject_id: 3003
    dsdl_type: "uavcan.primitive.scalar.Real32"
    type: publish
    source_sensor: local_humidity
    publish_interval: 5s
  
  # ==========================================================
  # 从其他节点接收温度 (其他节点发布到subject_id 3001)
  # ==========================================================
  # - platform: cyphal
  #   cyphal_id: my_cyphal
  #   name: "Remote Temperature"
  #   subject_id: 3001
  #   dsdl_type: "uavcan.si.sample.temperature.Scalar"
  #   type: subscribe
  #   extent: 256
  
  # ==========================================================
  # 压力传感器
  # 支持: uavcan.si.sample.pressure.Scalar
  # ==========================================================
  # - platform: cyphal
  #   cyphal_id: my_cyphal
  #   name: "Remote Pressure"
  #   subject_id: 3003
  #   dsdl_type: "uavcan.si.sample.pressure.Scalar"
  #   type: subscribe
  #   extent: 256
  
  # ==========================================================
  # 功率传感器
  # 支持: uavcan.si.sample.power.Scalar
  # ==========================================================
  # - platform: cyphal
  #   cyphal_id: my_cyphal
  #   name: "Remote Power"
  #   subject_id: 3004
  #   dsdl_type: "uavcan.si.sample.power.Scalar"
  #   type: subscribe
  #   extent: 256
  
  # ==========================================================
  # 电压传感器
  # 支持: uavcan.si.sample.voltage.Scalar
  # ==========================================================
  # - platform: cyphal
  #   cyphal_id: my_cyphal
  #   name: "Remote Voltage"
  #   subject_id: 3005
  #   dsdl_type: "uavcan.si.sample.voltage.Scalar"
  #   type: subscribe
  #   extent: 256
  
  # ==========================================================
  # 电流传感器
  # 支持: uavcan.si.sample.electric_current.Scalar
  # ==========================================================
  # - platform: cyphal
  #   cyphal_id: my_cyphal
  #   name: "Remote Current"
  #   subject_id: 3006
  #   dsdl_type: "uavcan.si.sample.electric_current.Scalar"
  #   type: subscribe
  #   extent: 256
  
  # ==========================================================
  # 通用数值传感器 - 使用Real32
  # 支持: uavcan.primitive.scalar.Real32
  # ==========================================================
  # - platform: cyphal
  #   cyphal_id: my_cyphal
  #   name: "Generic Sensor Value"
  #   subject_id: 3007
  #   dsdl_type: "uavcan.primitive.scalar.Real32"

  # ============================================================
  # Cyphal 能源传感器示例
  # 通过YAML配置dsdl_type，支持任意能源类型
  # ============================================================
  # 功率传感器
  - platform: cyphal
    cyphal_id: my_cyphal
    name: "Power Consumption"
    subject_id: 8001
    dsdl_type: "uavcan.si.sample.power.Scalar"
    extent: 256
    unit_of_measurement: "W"
    device_class: power
  
  # 电压传感器
  - platform: cyphal
    cyphal_id: my_cyphal
    name: "Battery Voltage"
    subject_id: 8002
    dsdl_type: "uavcan.si.sample.voltage.Scalar"
    type: subscribe
    extent: 256
    unit_of_measurement: "V"
    device_class: voltage
  
  # 电流传感器
  - platform: cyphal
    cyphal_id: my_cyphal
    name: "Battery Current"
    subject_id: 8003
    dsdl_type: "uavcan.si.sample.electric_current.Scalar"
    type: subscribe
    extent: 256
    unit_of_measurement: "A"
    device_class: current
  
  # 能量传感器
  - platform: cyphal
    cyphal_id: my_cyphal
    name: "Energy Used"
    subject_id: 8004
    dsdl_type: "uavcan.si.sample.energy.Scalar"
    type: subscribe
    extent: 256
    unit_of_measurement: "Wh"
    device_class: energy
  #   type: subscribe
  #   extent: 256
  
  # ==========================================================
  # 更多支持的传感器类型:
  # - uavcan.si.sample.length.Scalar (长度/距离)
  # - uavcan.si.sample.velocity.Scalar (速度)
  # - uavcan.si.sample.acceleration.Scalar (加速度)
  # - uavcan.si.sample.mass.Scalar (质量)
  # - uavcan.si.sample.force.Scalar (力)
  # - uavcan.si.sample.torque.Scalar (扭矩)
  # - uavcan.si.sample.frequency.Scalar (频率)
  # - uavcan.si.sample.angle.Scalar (角度)
  # - uavcan.si.sample.angular_velocity.Scalar (角速度)
  # - uavcan.si.sample.electric_charge.Scalar (电荷)
  # - uavcan.si.sample.luminance.Scalar (亮度)
  # - uavcan.si.sample.duration.Scalar (持续时间)
  # - uavcan.si.sample.volume.Scalar (体积)
  # - uavcan.si.sample.volumetric_flow_rate.Scalar (体积流量)
  # - uavcan.si.sample.magnetic_field_strength.Scalar (磁场强度，单位: A/m)
  # - uavcan.si.sample.magnetic_flux_density.Scalar (磁通密度，单位: Tesla)
  # ==========================================================

# ============================================================
# Cyphal 开关模块示例
# 使用标准DSDL: uavcan.primitive.scalar.Bit
# ============================================================
switch:
  # 从Cyphal网络接收开关命令
  - platform: cyphal
    cyphal_id: my_cyphal
    name: "Remote Controlled Switch"
    subject_id: 4000
    dsdl_type: "uavcan.primitive.scalar.Bit"
    type: subscribe
    extent: 32
  
  # 发布开关状态到Cyphal网络
  # - platform: cyphal
  #   cyphal_id: my_cyphal
  #   name: "Published Switch State"
  #   subject_id: 4001
  #   dsdl_type: "uavcan.primitive.scalar.Bit"
  #   type: publish
  #   source_switch: local_switch

